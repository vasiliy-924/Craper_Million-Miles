name: 25_million_miles_scraper
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cars_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/cars_db
      JWT_SECRET: your-secret-key-change-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      - db

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/cars_db
      WORKER_MODE: loop
      SCRAPE_INTERVAL_SECONDS: "3600"
      SCRAPER_BRANDS: TO,HO,NI
      SCRAPER_MAX_PAGES: "1"
      SCRAPER_MAX_CARS: "20"
    command: ["python", "-m", "worker.main"]
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data: