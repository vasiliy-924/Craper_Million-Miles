name: 25_million_miles_scraper
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cars_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cars_db
      JWT_SECRET: your-secret-key-change-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      - db

volumes:
  postgres_data: